<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WebRTC Screen Monitor</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 1. Server Ulanish Oynasi -->
    <div class="glass-container" id="connect-screen">
        <h1>Serverga ulanish</h1>
        <p class="status">Localtunnel havolasini kiriting</p>
        <div class="control-group">
            <input type="text" id="ip-input" placeholder="https://nimadir.loca.lt">
        </div>
        <button id="connect-btn" class="action-btn">Ulanish</button>
    </div>

    <!-- 2. Xona va Rol tanlash oynasi -->
    <div class="glass-container" id="room-screen" style="display: none;">
        <h1>Ulanish Xonasi</h1>
        <p class="status">Holat: <span id="connection-status" class="connected">Ulandi</span></p>
        
        <div class="control-group">
            <label for="room-id">Maxfiy Kod (ID):</label>
            <input type="text" id="room-id" placeholder="Masalan: bola123" value="bola123">
        </div>

        <button id="share-btn" class="action-btn share-btn">Ekranimni Berish (Farzand telefoni)</button>
        <button id="view-btn" class="action-btn view-btn">Kuzatish (Ota-ona telefoni)</button>
    </div>

    <!-- 3. Video Oynasi -->
    <div id="video-screen" style="display: none;">
        <video id="remote-video" autoplay playsinline></video>
        <div class="controls-overlay">
            <button id="stop-btn" class="action-btn stop-btn">Tugatish / Chiqish</button>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
